<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- CSS Variables for Easy Theming --- */
        :root {
            --bg-color: #f5f7fa;
            --text-color: #333333;
            --container-bg: #ffffff;
            --border-color: #e0e0e0;
            --btn-bg: #3498db;
            --btn-hover: #2980b9;
        }

        /* --- Dark Mode Variables --- */
        body.dark-mode {
            --bg-color: #121212;
            --text-color: #ffffff;
            --container-bg: #1e1e1e;
            --border-color: #333333;
            --btn-bg: #6c5ce7;
            --btn-hover: #5b4bc4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Top Navigation / Header */
        .header {
            width: 100%;
            max-width: 700px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .theme-btn {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background-color: var(--container-bg);
            color: var(--text-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .theme-btn:hover {
            transform: translateY(-2px);
        }

        /* Main Content Container */
        .main-container {
            background-color: var(--container-bg);
            width: 100%;
            max-width: 700px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 600;
        }

        p.subtitle {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            resize: none;
            font-size: 16px;
            outline: none;
            background-color: transparent;
            color: var(--text-color);
        }

        textarea:focus {
            border-color: var(--btn-bg);
        }

        .action-btn {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background-color: var(--btn-bg);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        .action-btn:hover {
            background-color: var(--btn-hover);
        }

        /* Footer */
        .footer {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.7;
        }

    </style>
</head>
<body>

    <!-- Header area containing the Toggle Button -->
    <div class="header">
        <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
    </div>

    <!-- Main Working Area -->
    <div class="main-container">
        <h1>✨ Project Dashboard</h1>
        <p class="subtitle">Enter your data below to get started with the process.</p>

        <textarea id="user-input" placeholder="Type something here..."></textarea>
        
        <button class="action-btn" id="submit-btn">Submit Data</button>
    </div>

    <!-- Footer Area -->
    <div class="footer">
        Designed by Manish Sharma
    </div>

    <!-- --- JavaScript Logic --- -->
    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        // 1. Check local storage on page load
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            themeToggleBtn.innerText = '☀️ Light Mode';
        }

        // 2. Toggle logic when button is clicked
        themeToggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark'); 
                themeToggleBtn.innerText = '☀️ Light Mode'; 
            } else {
                localStorage.setItem('theme', 'light'); 
                themeToggleBtn.innerText = '🌙 Dark Mode';
            }
        });

        // Demo logic for the submit button
        document.getElementById('submit-btn').addEventListener('click', () => {
            const input = document.getElementById('user-input').value;
            if(input.trim() === "") {
                alert("Please enter some text first!");
            } else {
                alert("Data Submitted Successfully!");
            }
        });
    </script>
</body>
</html>
