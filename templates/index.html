<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fake News Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- CSS Variables --- */
        :root {
            --bg-color: #f5f7fa;
            --text-color: #333333;
            --container-bg: #ffffff;
            --border-color: #e0e0e0;
            --btn-bg: #3498db;
            --btn-hover: #2980b9;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #ffffff;
            --container-bg: #1e1e1e;
            --border-color: #333333;
            --btn-bg: #6c5ce7;
            --btn-hover: #5b4bc4;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }

        .header {
            width: 100%; max-width: 700px; display: flex;
            justify-content: flex-end; margin-bottom: 20px;
        }

        .theme-btn {
            padding: 10px 18px; border-radius: 8px; border: none;
            cursor: pointer; font-weight: 600;
            background-color: var(--container-bg); color: var(--text-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .main-container {
            background-color: var(--container-bg); width: 100%;
            max-width: 700px; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); text-align: center;
        }

        h1 { margin-bottom: 10px; font-size: 28px; font-weight: 600; }
        p.subtitle { color: #7f8c8d; margin-bottom: 25px; font-size: 14px; }

        .input-wrapper { position: relative; width: 100%; }

        textarea {
            width: 100%; height: 120px; padding: 15px; padding-right: 40px;
            border: 2px solid var(--border-color); border-radius: 10px;
            resize: none; font-size: 16px; outline: none;
            background-color: transparent; color: var(--text-color);
        }
        textarea:focus { border-color: var(--btn-bg); }

        #mic-btn {
            position: absolute; bottom: 15px; right: 15px;
            background: none; border: none; font-size: 20px;
            cursor: pointer; transition: transform 0.2s ease; outline: none;
        }
        #mic-btn.recording { animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); filter: grayscale(0%); }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 5px red); }
            100% { transform: scale(1); filter: grayscale(0%); }
        }

        #counter-box {
            text-align: right; font-size: 12px; color: #7f8c8d;
            margin-top: 5px; font-weight: 600;
        }
        body.dark-mode #counter-box { color: #b2bec3; }

        .action-btn {
            margin-top: 15px; padding: 12px 25px; font-size: 16px;
            font-weight: 600; color: white; background-color: var(--btn-bg);
            border: none; border-radius: 8px; cursor: pointer; width: 100%;
        }
        .action-btn:disabled { background-color: #95a5a6; cursor: not-allowed; }

        #result-box {
            display: none; margin-top: 25px; padding: 20px;
            background-color: var(--container-bg);
            border: 2px dashed var(--border-color); border-radius: 10px;
            text-align: left; position: relative;
        }

        .result-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        #copy-btn {
            display: none; background-color: #2ecc71; color: white;
            border: none; padding: 6px 12px; border-radius: 6px;
            font-size: 12px; font-weight: 600; cursor: pointer;
        }

        .cursor {
            display: inline-block; width: 3px; height: 15px;
            background-color: var(--text-color); margin-left: 2px;
            animation: blink 0.7s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .footer { margin-top: 30px; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="header">
        <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
    </div>

    <div class="main-container">
        <h1>✨ AI Fact Checker</h1>
        <p class="subtitle">Type or speak a news claim below to check its authenticity.</p>

        <div class="input-wrapper">
            <textarea id="user-input" placeholder="Enter Hindi/Hinglish news or paste a URL..."></textarea>
            <button id="mic-btn" title="Click to Speak">🎤</button>
        </div>
        
        <div id="counter-box">
            <span id="char-count">0</span> Characters | <span id="word-count">0</span> Words
        </div>
        
        <button class="action-btn" id="submit-btn">Verify Claim</button>

        <div id="result-box">
            <div class="result-header">
                <strong>AI Analysis Result:</strong>
                <button id="copy-btn">📋 Copy</button>
            </div>
            <p id="output-text"></p>
        </div>
    </div>

    <div class="footer">
        Designed by Manish Sharma
    </div>

    <script>
        // --- DARK MODE LOGIC ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            themeToggleBtn.innerText = '☀️ Light Mode';
        }
        themeToggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark'); themeToggleBtn.innerText = '☀️ Light Mode'; 
            } else {
                localStorage.setItem('theme', 'light'); themeToggleBtn.innerText = '🌙 Dark Mode';
            }
        });

        // --- COUNTER LOGIC ---
        const userInput = document.getElementById('user-input');
        const charCount = document.getElementById('char-count');
        const wordCount = document.getElementById('word-count');
        function updateCounter() {
            const text = userInput.value;
            charCount.innerText = text.length;
            wordCount.innerText = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
        }
        userInput.addEventListener('input', updateCounter);

        // --- VOICE INPUT LOGIC ---
        const micBtn = document.getElementById('mic-btn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false; recognition.lang = 'hi-IN'; // Hindi/Hinglish supported
            micBtn.addEventListener('click', () => recognition.start());
            recognition.onstart = () => micBtn.classList.add('recording');
            recognition.onspeechend = () => { recognition.stop(); micBtn.classList.remove('recording'); };
            recognition.onresult = (event) => {
                userInput.value += (userInput.value ? " " : "") + event.results[0][0].transcript; 
                updateCounter();
            };
            recognition.onerror = () => micBtn.classList.remove('recording');
        } else {
            micBtn.style.display = "none";
        }

        // --- ASLI API FETCH + TYPEWRITER LOGIC ---
        const submitBtn = document.getElementById('submit-btn');
        const copyBtn = document.getElementById('copy-btn');
        const outputText = document.getElementById('output-text');
        const resultBox = document.getElementById('result-box');

        submitBtn.addEventListener('click', async () => {
            const input = userInput.value;
            if(input.trim() === "") { alert("Please enter some text first!"); return; }
            
            // UI Preparation
            resultBox.style.display = 'block';
            outputText.innerHTML = "Connecting to AI Model... <span class='cursor'></span>"; 
            copyBtn.style.display = 'none'; 
            submitBtn.disabled = true; 
            submitBtn.innerText = "Analyzing Backend...";

            try {
                // Asli Backend Call
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                // Format the final text based on real backend response
                const label = data.prediction === "Real" ? "✅ REAL" : "🚨 FAKE";
                const fullText = `Prediction: ${label} (Confidence: ${data.confidence}%)\n\n✨ AI Reasoning:\n${data.explanation}`;
                
                outputText.innerHTML = ""; // Clear loader text
                let index = 0;

                // Typewriter logic for real data
                function typeWriter() {
                    if (index < fullText.length) {
                        if (fullText.charAt(index) === '\n') {
                            outputText.innerHTML += '<br>';
                        } else {
                            outputText.innerHTML += fullText.charAt(index);
                        }
                        index++;
                        setTimeout(typeWriter, 15); // Typewriter speed
                    } else {
                        outputText.innerHTML += '<span class="cursor"></span>';
                        submitBtn.disabled = false;
                        submitBtn.innerText = "Verify Claim";
                        copyBtn.style.display = 'inline-block'; 
                    }
                }
                typeWriter();

            } catch (error) {
                outputText.innerHTML = `⚠️ Backend Error: ${error.message}`;
                submitBtn.disabled = false;
                submitBtn.innerText = "Verify Claim";
            }
        });

        // --- COPY LOGIC ---
        copyBtn.addEventListener('click', () => {
            const textToCopy = outputText.innerText; 
            navigator.clipboard.writeText(textToCopy).then(() => {
                copyBtn.innerText = "✅ Copied!";
                copyBtn.style.backgroundColor = "#27ae60";
                setTimeout(() => { 
                    copyBtn.innerText = "📋 Copy"; 
                    copyBtn.style.backgroundColor = "#2ecc71";
                }, 2000);
            });
        });
    </script>
</body>
</html>
