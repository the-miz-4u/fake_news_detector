<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fake News Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        /* Modern Dark Gradient Background */
        body { 
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: #e0e0e0; 
            padding: 20px; 
        }
        
        /* Dark Theme Containers */
        .main-container, .history-container { 
            background: #1e1e2f; 
            width: 100%; 
            max-width: 600px; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); 
            text-align: center; 
            transition: transform 0.3s ease;
            border: 1px solid #2a2a40;
        }
        .main-container:hover { transform: translateY(-5px); }
        .history-container { padding: 25px 40px; margin-top: 20px; text-align: left; }
        
        h1 { color: #ffffff; margin-bottom: 10px; font-size: 28px; font-weight: 600; }
        h3 { color: #ffffff; font-size: 20px; margin-bottom: 15px; border-bottom: 2px solid #2a2a40; padding-bottom: 10px; }
        p.subtitle { color: #a0a0b0; margin-bottom: 25px; font-size: 14px; }
        
        /* Sleek Textarea */
        textarea { 
            width: 100%; 
            height: 120px; 
            padding: 15px; 
            border: 2px solid #3f3f5a; 
            border-radius: 10px; 
            resize: none; 
            font-size: 16px; 
            outline: none; 
            transition: all 0.3s ease; 
            background-color: #2a2a40; 
            color: #ffffff;
        }
        textarea::placeholder { color: #7a7a90; }
        textarea:focus { border-color: #00d2ff; background-color: #32324e; box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }
        
        /* Vibrant Button */
        button { 
            margin-top: 20px; 
            padding: 12px 25px; 
            font-size: 16px; 
            font-weight: 600; 
            color: white; 
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            transition: background 0.3s ease, transform 0.2s ease; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
        }
        button:hover { background: linear-gradient(135deg, #3a7bd5 0%, #00d2ff 100%); transform: scale(1.02); }
        
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Adjusted Result Boxes for Dark Theme */
        #result-box { margin-top: 25px; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: 600; display: none; opacity: 0; transition: opacity 0.5s ease; text-align: left; }
        .real-news { background-color: rgba(40, 167, 69, 0.15); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }
        .fake-news { background-color: rgba(220, 53, 69, 0.15); color: #ff6b6b; border: 1px solid rgba(255, 107, 107, 0.3); }
        
        .confidence-container { margin-top: 15px; }
        .confidence-text { font-size: 14px; font-weight: 400; margin-bottom: 5px; color: #e0e0e0; }
        .progress-bg { background: rgba(255, 255, 255, 0.1); border-radius: 5px; height: 10px; width: 100%; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 1s ease-in-out; border-radius: 5px; }
        
        #explanation-box { margin-top: 15px; padding-top: 15px; border-top: 1px solid #3f3f5a; font-size: 14px; font-weight: 400; display: none; color: #dcdcdc; }
        .ai-badge { display: inline-block; background: #6c5ce7; color: white; font-size: 11px; padding: 3px 8px; border-radius: 12px; margin-bottom: 5px; font-weight: 600; }
        
        /* History Item Styles */
        .history-item { padding: 12px 0; border-bottom: 1px solid #2a2a40; display: flex; flex-direction: column; gap: 8px; transition: background 0.2s ease; }
        .history-item:last-child { border-bottom: none; }
        .h-text { font-size: 14px; color: #b0b0c0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-style: italic; }
        .h-meta { font-size: 13px; font-weight: 600; }
        .h-badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; color: white; margin-right: 8px; }
        .h-real { background-color: #2ecc71; color: #000; }
        .h-fake { background-color: #ff6b6b; color: #000; }
        
        .footer { margin-top: 30px; color: #666680; font-size: 14px; text-align: center; font-weight: 300; }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>📰 Verify The News</h1>
        <p class="subtitle">Paste any News Text <strong>OR</strong> an Article Link (URL) below to check its authenticity.</p>

        <form id="news-form">
            <textarea id="news-text" placeholder="Enter news text OR paste an article link (e.g., https://...) here..." required></textarea>
            <button type="submit" id="submit-btn">
                <span id="btn-text">Verify Claim</span>
                <div class="spinner" id="loading-spinner"></div>
            </button>
        </form>

        <div id="result-box">
            <div id="prediction-text" style="text-align: center;"></div>
            <div class="confidence-container">
                <div class="confidence-text" id="confidence-label">AI Confidence: 0%</div>
                <div class="progress-bg"><div class="progress-bar" id="confidence-bar"></div></div>
            </div>
            <div id="explanation-box">
                <span class="ai-badge">✨ AI Reasoning</span>
                <p id="explanation-text"></p>
            </div>
        </div>
    </div>

    <div class="history-container">
        <h3>🕒 Recent Fact-Checks</h3>
        <div id="history-list">
            <p style="font-size: 14px; color: #7a7a90;">No recent searches yet.</p>
        </div>
    </div>

    <div class="footer">
        Designed by Manish Sharma
    </div>

    <script>
        // Page load hote hi history fetch karna
        window.onload = loadHistory;

        async function loadHistory() {
            try {
                const response = await fetch('/history');
                const data = await response.json();
                
                const historyList = document.getElementById('history-list');
                
                if (data.length > 0) {
                    historyList.innerHTML = '';
                    data.forEach(item => {
                        const badgeClass = item.prediction === 'Real' ? 'h-real' : 'h-fake';
                        historyList.innerHTML += `
                            <div class="history-item">
                                <div class="h-text">"${item.text}"</div>
                                <div class="h-meta">
                                    <span class="h-badge ${badgeClass}">${item.prediction}</span>
                                    <span style="color: #7a7a90;">Conf: ${item.confidence}%</span>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (error) {
                console.error("History fetch fail:", error);
            }
        }

        document.getElementById('news-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newsText = document.getElementById('news-text').value;
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('loading-spinner');
            const resultBox = document.getElementById('result-box');
            const submitBtn = document.getElementById('submit-btn');
            
            btnText.innerText = "Analyzing...";
            spinner.style.display = "block";
            submitBtn.disabled = true;
            resultBox.style.display = "none";
            document.getElementById('explanation-box').style.display = "none";
            resultBox.style.opacity = "0";

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: newsText })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error);

                resultBox.style.display = "block";
                setTimeout(() => resultBox.style.opacity = "1", 50);

                if (data.prediction === "Real") {
                    resultBox.className = "real-news";
                    document.getElementById('prediction-text').innerHTML = "✅ This claim appears to be <strong>REAL</strong>.";
                    document.getElementById('confidence-bar').style.backgroundColor = "#2ecc71";
                } else {
                    resultBox.className = "fake-news";
                    document.getElementById('prediction-text').innerHTML = "🚨 This claim appears to be <strong>FAKE</strong>.";
                    document.getElementById('confidence-bar').style.backgroundColor = "#ff6b6b";
                }

                document.getElementById('confidence-label').innerHTML = `AI Confidence: <strong>${data.confidence}%</strong>`;
                setTimeout(() => { document.getElementById('confidence-bar').style.width = `${data.confidence}%`; }, 100);

                document.getElementById('explanation-box').style.display = "block";
                document.getElementById('explanation-text').innerHTML = data.explanation;

                // --- NAYA: Nayi search ke baad history table ko chupchap refresh karna ---
                loadHistory();

            } catch (error) {
                resultBox.style.display = "block";
                resultBox.style.opacity = "1";
                resultBox.className = "fake-news";
                document.getElementById('prediction-text').innerHTML = "⚠️ Error processing request on server.";
            } finally {
                btnText.innerText = "Verify Claim";
                spinner.style.display = "none";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
