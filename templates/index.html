<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- CSS Variables for Easy Theming --- */
        :root {
            --bg-color: #f5f7fa;
            --text-color: #333333;
            --container-bg: #ffffff;
            --border-color: #e0e0e0;
            --btn-bg: #3498db;
            --btn-hover: #2980b9;
        }

        /* --- Dark Mode Variables --- */
        body.dark-mode {
            --bg-color: #121212;
            --text-color: #ffffff;
            --container-bg: #1e1e1e;
            --border-color: #333333;
            --btn-bg: #6c5ce7;
            --btn-hover: #5b4bc4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Top Navigation / Header */
        .header {
            width: 100%;
            max-width: 700px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .theme-btn {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background-color: var(--container-bg);
            color: var(--text-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .theme-btn:hover {
            transform: translateY(-2px);
        }

        /* Main Content Container */
        .main-container {
            background-color: var(--container-bg);
            width: 100%;
            max-width: 700px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 600;
        }

        p.subtitle {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            resize: none;
            font-size: 16px;
            outline: none;
            background-color: transparent;
            color: var(--text-color);
        }

        textarea:focus {
            border-color: var(--btn-bg);
        }

        .action-btn {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background-color: var(--btn-bg);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        .action-btn:hover {
            background-color: var(--btn-hover);
        }

        /* --- NAYA: Result Box --- */
        #result-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background-color: var(--container-bg);
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            text-align: left;
            position: relative;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        #copy-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        #copy-btn:hover {
            background-color: #27ae60;
        }

        /* Footer */
        .footer {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.7;
        }

    </style>
</head>
<body>

    <div class="header">
        <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
    </div>

    <div class="main-container">
        <h1>✨ Project Dashboard</h1>
        <p class="subtitle">Enter your data below and click submit.</p>

        <textarea id="user-input" placeholder="Type something here..."></textarea>
        
        <button class="action-btn" id="submit-btn">Process Data</button>

        <div id="result-box">
            <div class="result-header">
                <strong>Output Result:</strong>
                <button id="copy-btn">📋 Copy</button>
            </div>
            <p id="output-text"></p>
        </div>
    </div>

    <div class="footer">
        Designed by Manish Sharma
    </div>

    <script>
        // ------------------ DARK MODE LOGIC ------------------
        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            themeToggleBtn.innerText = '☀️ Light Mode';
        }

        themeToggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark'); 
                themeToggleBtn.innerText = '☀️ Light Mode'; 
            } else {
                localStorage.setItem('theme', 'light'); 
                themeToggleBtn.innerText = '🌙 Dark Mode';
            }
        });

        // ------------------ SUBMIT & COPY LOGIC ------------------
        document.getElementById('submit-btn').addEventListener('click', () => {
            const input = document.getElementById('user-input').value;
            
            if(input.trim() === "") {
                alert("Please enter some text first!");
            } else {
                // Input ko process karke Result box me dikhana
                document.getElementById('result-box').style.display = 'block';
                document.getElementById('output-text').innerText = "Processed: " + input;
            }
        });

        // Copy Button Event Listener
        document.getElementById('copy-btn').addEventListener('click', () => {
            // Text nikalna
            const textToCopy = document.getElementById('output-text').innerText;
            
            // System clipboard me dalna
            navigator.clipboard.writeText(textToCopy).then(() => {
                const copyBtn = document.getElementById('copy-btn');
                
                // Success message dikhana
                copyBtn.innerText = "✅ Copied!";
                copyBtn.style.backgroundColor = "#27ae60"; // Thoda dark green
                
                // 2 second baad wapas normal kar dena
                setTimeout(() => { 
                    copyBtn.innerText = "📋 Copy"; 
                    copyBtn.style.backgroundColor = "#2ecc71";
                }, 2000);
            }).catch(err => {
                alert("Failed to copy! " + err);
            });
        });
    </script>
</body>
</html>
