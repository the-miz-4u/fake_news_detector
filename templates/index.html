<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fake News Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- CSS Variables --- */
        :root {
            --bg-color: #f5f7fa;
            --text-color: #333333;
            --container-bg: #ffffff;
            --border-color: #e0e0e0;
            --btn-bg: #3498db;
            --btn-hover: #2980b9;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #ffffff;
            --container-bg: #1e1e1e;
            --border-color: #333333;
            --btn-bg: #6c5ce7;
            --btn-hover: #5b4bc4;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start; padding: 40px 20px;
        }

        .header {
            width: 100%; max-width: 700px; display: flex;
            justify-content: flex-end; margin-bottom: 20px;
        }

        .theme-btn {
            padding: 10px 18px; border-radius: 8px; border: none;
            cursor: pointer; font-weight: 600;
            background-color: var(--container-bg); color: var(--text-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .main-container, .history-container {
            background-color: var(--container-bg); width: 100%;
            max-width: 700px; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); text-align: center;
            margin-bottom: 20px;
        }

        h1 { margin-bottom: 10px; font-size: 28px; font-weight: 600; }
        p.subtitle { color: #7f8c8d; margin-bottom: 25px; font-size: 14px; }

        .input-wrapper { position: relative; width: 100%; }

        textarea {
            width: 100%; height: 120px; padding: 15px; padding-right: 40px;
            border: 2px solid var(--border-color); border-radius: 10px;
            resize: none; font-size: 16px; outline: none;
            background-color: transparent; color: var(--text-color);
        }
        textarea:focus { border-color: var(--btn-bg); }

        #mic-btn {
            position: absolute; bottom: 15px; right: 15px;
            background: none; border: none; font-size: 20px;
            cursor: pointer; transition: transform 0.2s ease; outline: none;
        }
        #mic-btn.recording { animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); filter: grayscale(0%); }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 5px red); }
            100% { transform: scale(1); filter: grayscale(0%); }
        }

        #counter-box {
            text-align: right; font-size: 12px; color: #7f8c8d;
            margin-top: 5px; font-weight: 600;
        }
        body.dark-mode #counter-box { color: #b2bec3; }

        .button-group { display: flex; gap: 10px; margin-top: 15px; width: 100%; }

        .action-btn {
            padding: 12px 25px; font-size: 16px; font-weight: 600;
            color: white; background-color: var(--btn-bg);
            border: none; border-radius: 8px; cursor: pointer; flex: 3;
        }
        .action-btn:disabled { background-color: #95a5a6; cursor: not-allowed; }

        .clear-btn {
            padding: 12px 15px; font-size: 16px; font-weight: 600;
            color: white; background-color: #e74c3c;
            border: none; border-radius: 8px; cursor: pointer; flex: 1;
            transition: background-color 0.3s ease;
        }
        .clear-btn:hover { background-color: #c0392b; }

        #result-box {
            display: none; margin-top: 25px; padding: 20px;
            background-color: var(--bg-color); 
            border: 2px dashed var(--border-color); border-radius: 10px;
            text-align: left; position: relative;
        }

        .result-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        #copy-btn {
            display: none; background-color: #2ecc71; color: white;
            border: none; padding: 6px 12px; border-radius: 6px;
            font-size: 12px; font-weight: 600; cursor: pointer;
        }

        #prediction-badge {
            font-size: 20px; font-weight: bold; margin-bottom: 10px; display: none;
        }
        
        .confidence-container { margin-top: 10px; margin-bottom: 20px; display: none; }
        .confidence-header {
            display: flex; justify-content: space-between; font-size: 14px; 
            font-weight: 600; margin-bottom: 5px;
        }
        .progress-bg {
            background: rgba(0,0,0,0.1); border-radius: 6px; height: 12px; 
            width: 100%; overflow: hidden;
        }
        body.dark-mode .progress-bg { background: rgba(255,255,255,0.1); }
        .progress-bar {
            height: 100%; width: 0%; border-radius: 6px; 
            transition: width 1.2s cubic-bezier(0.25, 1, 0.5, 1); 
        }

        /* --- NAYA: Feedback Section Styling --- */
        #feedback-box {
            display: none; margin-top: 20px; padding-top: 15px;
            border-top: 1px solid var(--border-color); text-align: center;
        }
        .feedback-text { font-size: 14px; margin-bottom: 10px; font-weight: 600; }
        .feedback-btn {
            background-color: var(--container-bg); border: 1px solid var(--border-color);
            color: var(--text-color); padding: 8px 15px; border-radius: 20px;
            cursor: pointer; font-size: 14px; margin: 0 5px; transition: all 0.2s ease;
        }
        .feedback-btn:hover { background-color: var(--bg-color); transform: scale(1.05); }
        .feedback-btn.active-up { background-color: #2ecc71; color: white; border-color: #2ecc71; }
        .feedback-btn.active-down { background-color: #e74c3c; color: white; border-color: #e74c3c; }
        #feedback-msg { display: none; font-size: 13px; color: #2ecc71; margin-top: 10px; font-weight: 600; }

        .history-container { padding: 25px; text-align: left; }
        .history-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px;}
        .history-list { list-style: none; }
        .history-item {
            padding: 12px; border: 1px solid var(--border-color);
            border-radius: 8px; margin-bottom: 10px; font-size: 14px;
            display: flex; flex-direction: column; gap: 8px;
            background-color: var(--bg-color);
        }
        .history-top { display: flex; justify-content: space-between; align-items: center; }
        .history-badge {
            padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; color: white;
        }
        .badge-real { background-color: #2ecc71; }
        .badge-fake { background-color: #e74c3c; }
        .history-text { color: var(--text-color); font-style: italic; opacity: 0.9; }
        
        .cursor {
            display: inline-block; width: 3px; height: 15px;
            background-color: var(--text-color); margin-left: 2px;
            animation: blink 0.7s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        .footer { margin-top: 10px; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="header">
        <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
    </div>

    <!-- MAIN WORKING AREA -->
    <div class="main-container">
        <h1>✨ AI Fact Checker</h1>
        <p class="subtitle">Type or speak a news claim below to check its authenticity.</p>

        <div class="input-wrapper">
            <textarea id="user-input" placeholder="Enter Hindi/Hinglish news or paste a URL..."></textarea>
            <button id="mic-btn" title="Click to Speak">🎤</button>
        </div>
        
        <div id="counter-box">
            <span id="char-count">0</span> Characters | <span id="word-count">0</span> Words
        </div>
        
        <div class="button-group">
            <button class="action-btn" id="submit-btn">Verify Claim</button>
            <button class="clear-btn" id="clear-btn">🗑️ Clear</button>
        </div>

        <div id="result-box">
            <div class="result-header">
                <strong>AI Analysis Result:</strong>
                <button id="copy-btn">📋 Copy</button>
            </div>
            
            <div id="prediction-badge"></div>
            <div class="confidence-container" id="confidence-container">
                <div class="confidence-header">
                    <span>AI Confidence Level</span>
                    <span id="confidence-percentage">0%</span>
                </div>
                <div class="progress-bg">
                    <div class="progress-bar" id="confidence-bar"></div>
                </div>
            </div>

            <p id="output-text"></p>

            <!-- --- NAYA: Feedback UI --- -->
            <div id="feedback-box">
                <p class="feedback-text">Did our AI get this right?</p>
                <button class="feedback-btn" id="thumb-up">👍 Yes</button>
                <button class="feedback-btn" id="thumb-down">👎 No</button>
                <p id="feedback-msg">Thanks! This helps train our AI.</p>
            </div>
        </div>
    </div>

    <!-- RECENT HISTORY AREA -->
    <div class="history-container">
        <h2 class="history-title">🕒 Recent Searches</h2>
        <ul class="history-list" id="history-list">
            <li class="history-item">Loading history...</li>
        </ul>
    </div>

    <div class="footer">
        Designed by Manish Sharma
    </div>

    <script>
        // --- THEME LOGIC ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            themeToggleBtn.innerText = '☀️ Light Mode';
        }
        themeToggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark'); themeToggleBtn.innerText = '☀️ Light Mode'; 
            } else {
                localStorage.setItem('theme', 'light'); themeToggleBtn.innerText = '🌙 Dark Mode';
            }
        });

        // --- HISTORY FETCH LOGIC ---
        const historyList = document.getElementById('history-list');
        async function loadHistory() {
            try {
                const response = await fetch('/history');
                const data = await response.json();
                historyList.innerHTML = ""; 
                if (data.length === 0) {
                    historyList.innerHTML = "<li class='history-item'>No recent searches found.</li>";
                    return;
                }
                data.forEach(item => {
                    const isReal = item.prediction === "Real";
                    const badgeClass = isReal ? "badge-real" : "badge-fake";
                    const badgeText = isReal ? "✅ REAL" : "🚨 FAKE";
                    const li = document.createElement('li');
                    li.className = 'history-item';
                    li.innerHTML = `
                        <div class="history-top">
                            <span class="history-badge ${badgeClass}">${badgeText}</span>
                            <span style="font-size: 12px; font-weight: 600;">Conf: ${item.confidence}%</span>
                        </div>
                        <div class="history-text">"${item.text}"</div>
                    `;
                    historyList.appendChild(li);
                });
            } catch (error) {
                historyList.innerHTML = "<li class='history-item'>Failed to load history.</li>";
            }
        }
        window.addEventListener('DOMContentLoaded', loadHistory);

        // --- COUNTER LOGIC ---
        const userInput = document.getElementById('user-input');
        const charCount = document.getElementById('char-count');
        const wordCount = document.getElementById('word-count');
        function updateCounter() {
            const text = userInput.value;
            charCount.innerText = text.length;
            wordCount.innerText = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
        }
        userInput.addEventListener('input', updateCounter);

        // --- VOICE LOGIC ---
        const micBtn = document.getElementById('mic-btn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false; recognition.lang = 'hi-IN'; 
            micBtn.addEventListener('click', () => recognition.start());
            recognition.onstart = () => micBtn.classList.add('recording');
            recognition.onspeechend = () => { recognition.stop(); micBtn.classList.remove('recording'); };
            recognition.onresult = (event) => {
                userInput.value += (userInput.value ? " " : "") + event.results[0][0].transcript; 
                updateCounter();
            };
            recognition.onerror = () => micBtn.classList.remove('recording');
        } else {
            micBtn.style.display = "none";
        }

        // --- CLEAR & FEEDBACK VARIABLES ---
        const clearBtn = document.getElementById('clear-btn');
        const resultBox = document.getElementById('result-box');
        const outputText = document.getElementById('output-text');
        const submitBtn = document.getElementById('submit-btn');
        const copyBtn = document.getElementById('copy-btn');
        const predictionBadge = document.getElementById('prediction-badge');
        const confidenceContainer = document.getElementById('confidence-container');
        const confidenceBar = document.getElementById('confidence-bar');
        const confidencePercentage = document.getElementById('confidence-percentage');
        
        // Feedback DOM elements
        const feedbackBox = document.getElementById('feedback-box');
        const thumbUp = document.getElementById('thumb-up');
        const thumbDown = document.getElementById('thumb-down');
        const feedbackMsg = document.getElementById('feedback-msg');
        
        // Store current prediction globally for feedback
        let currentInputText = "";
        let currentPrediction = "";

        clearBtn.addEventListener('click', () => {
            userInput.value = "";
            updateCounter();
            resultBox.style.display = 'none';
            outputText.innerHTML = "";
            submitBtn.disabled = false;
            submitBtn.innerText = "Verify Claim";
            predictionBadge.style.display = 'none';
            confidenceContainer.style.display = 'none';
            confidenceBar.style.width = '0%';
            
            // Hide feedback box on clear
            feedbackBox.style.display = 'none';
            feedbackMsg.style.display = 'none';
            thumbUp.classList.remove('active-up');
            thumbDown.classList.remove('active-down');
        });

        // --- API FETCH + TYPEWRITER LOGIC ---
        submitBtn.addEventListener('click', async () => {
            const input = userInput.value;
            if(input.trim() === "") { alert("Please enter some text first!"); return; }
            
            currentInputText = input; // Save for feedback
            
            resultBox.style.display = 'block';
            outputText.innerHTML = "Connecting to AI Model... <span class='cursor'></span>"; 
            copyBtn.style.display = 'none'; 
            submitBtn.disabled = true; 
            submitBtn.innerText = "Analyzing Backend...";
            
            predictionBadge.style.display = 'none';
            confidenceContainer.style.display = 'none';
            confidenceBar.style.width = '0%';
            feedbackBox.style.display = 'none'; // Hide feedback while loading

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                currentPrediction = data.prediction; // Save for feedback

                const isReal = data.prediction === "Real";
                const labelText = isReal ? "✅ PREDICTION: REAL" : "🚨 PREDICTION: FAKE";
                const barColor = isReal ? "#2ecc71" : "#e74c3c"; 
                
                predictionBadge.innerText = labelText;
                predictionBadge.style.color = barColor;
                predictionBadge.style.display = 'block';
                
                confidencePercentage.innerText = `${data.confidence}%`;
                confidenceContainer.style.display = 'block';
                
                setTimeout(() => {
                    confidenceBar.style.backgroundColor = barColor;
                    confidenceBar.style.width = `${data.confidence}%`;
                }, 100);
                
                const fullText = `✨ AI Reasoning:\n${data.explanation}`;
                outputText.innerHTML = ""; 
                let index = 0;

                function typeWriter() {
                    if (index < fullText.length) {
                        if (fullText.charAt(index) === '\n') {
                            outputText.innerHTML += '<br>';
                        } else {
                            outputText.innerHTML += fullText.charAt(index);
                        }
                        index++;
                        setTimeout(typeWriter, 15); 
                    } else {
                        outputText.innerHTML += '<span class="cursor"></span>';
                        submitBtn.disabled = false;
                        submitBtn.innerText = "Verify Claim";
                        copyBtn.style.display = 'inline-block'; 
                        
                        // Show feedback box & update history
                        feedbackBox.style.display = 'block';
                        thumbUp.classList.remove('active-up');
                        thumbDown.classList.remove('active-down');
                        feedbackMsg.style.display = 'none';
                        loadHistory();
                    }
                }
                typeWriter();

            } catch (error) {
                outputText.innerHTML = `⚠️ Backend Error: ${error.message}`;
                submitBtn.disabled = false;
                submitBtn.innerText = "Verify Claim";
            }
        });

        // --- NAYA: FEEDBACK SUBMIT LOGIC ---
        async function sendFeedback(type) {
            try {
                await fetch('/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        text: currentInputText, 
                        prediction: currentPrediction,
                        feedback: type 
                    })
                });
                feedbackMsg.style.display = 'block';
            } catch (error) {
                console.log("Feedback failed to send:", error);
            }
        }

        thumbUp.addEventListener('click', () => {
            thumbUp.classList.add('active-up');
            thumbDown.classList.remove('active-down');
            sendFeedback('up');
        });

        thumbDown.addEventListener('click', () => {
            thumbDown.classList.add('active-down');
            thumbUp.classList.remove('active-up');
            sendFeedback('down');
        });

        // --- COPY LOGIC ---
        copyBtn.addEventListener('click', () => {
            const badgeText = predictionBadge.innerText;
            const confText = confidencePercentage.innerText;
            const explanationText = outputText.innerText;
            const textToCopy = `${badgeText} (Confidence: ${confText})\n\n${explanationText}`;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                copyBtn.innerText = "✅ Copied!";
                copyBtn.style.backgroundColor = "#27ae60";
                setTimeout(() => { 
                    copyBtn.innerText = "📋 Copy"; 
                    copyBtn.style.backgroundColor = "#2ecc71";
                }, 2000);
            });
        });
    </script>
</body>
</html>
