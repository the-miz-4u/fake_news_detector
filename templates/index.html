<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- CSS Variables --- */
        :root {
            --bg-color: #f5f7fa;
            --text-color: #333333;
            --container-bg: #ffffff;
            --border-color: #e0e0e0;
            --btn-bg: #3498db;
            --btn-hover: #2980b9;
        }

        /* --- Dark Mode Variables --- */
        body.dark-mode {
            --bg-color: #121212;
            --text-color: #ffffff;
            --container-bg: #1e1e1e;
            --border-color: #333333;
            --btn-bg: #6c5ce7;
            --btn-hover: #5b4bc4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header {
            width: 100%;
            max-width: 700px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .theme-btn {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background-color: var(--container-bg);
            color: var(--text-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .main-container {
            background-color: var(--container-bg);
            width: 100%;
            max-width: 700px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        h1 { margin-bottom: 10px; font-size: 28px; font-weight: 600; }
        p.subtitle { color: #7f8c8d; margin-bottom: 25px; font-size: 14px; }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            resize: none;
            font-size: 16px;
            outline: none;
            background-color: transparent;
            color: var(--text-color);
        }

        textarea:focus { border-color: var(--btn-bg); }

        /* --- NAYA: Counter Styling --- */
        #counter-box {
            text-align: right;
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
            font-weight: 600;
        }

        body.dark-mode #counter-box {
            color: #b2bec3;
        }

        .action-btn {
            margin-top: 15px;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background-color: var(--btn-bg);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        
        .action-btn:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .action-btn:hover:not(:disabled) { background-color: var(--btn-hover); }

        #result-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background-color: var(--container-bg);
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            text-align: left;
            position: relative;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        #copy-btn {
            display: none; 
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 15px;
            background-color: var(--text-color);
            margin-left: 2px;
            animation: blink 0.7s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .footer { margin-top: 30px; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="header">
        <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
    </div>

    <div class="main-container">
        <h1>✨ Project Dashboard</h1>
        <p class="subtitle">Enter your data below and click submit.</p>

        <textarea id="user-input" placeholder="Type something here..."></textarea>
        
        <div id="counter-box">
            <span id="char-count">0</span> Characters | <span id="word-count">0</span> Words
        </div>
        
        <button class="action-btn" id="submit-btn">Process Data</button>

        <div id="result-box">
            <div class="result-header">
                <strong>Output Result:</strong>
                <button id="copy-btn">📋 Copy</button>
            </div>
            <p id="output-text"></p>
        </div>
    </div>

    <div class="footer">
        Designed by Manish Sharma
    </div>

    <script>
        // --- DARK MODE LOGIC ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            themeToggleBtn.innerText = '☀️ Light Mode';
        }

        themeToggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark'); 
                themeToggleBtn.innerText = '☀️ Light Mode'; 
            } else {
                localStorage.setItem('theme', 'light'); 
                themeToggleBtn.innerText = '🌙 Dark Mode';
            }
        });

        // --- NAYA: COUNTER LOGIC ---
        const userInput = document.getElementById('user-input');
        const charCount = document.getElementById('char-count');
        const wordCount = document.getElementById('word-count');

        userInput.addEventListener('input', () => {
            const text = userInput.value;
            
            // Character count update
            charCount.innerText = text.length;
            
            // Word count update
            // Agar box khali hai toh 0 dikhaye, nahi toh words ko space se split karke count kare
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            wordCount.innerText = words;
        });

        // --- TYPEWRITER & SUBMIT LOGIC ---
        const submitBtn = document.getElementById('submit-btn');
        const copyBtn = document.getElementById('copy-btn');
        const outputText = document.getElementById('output-text');
        const resultBox = document.getElementById('result-box');

        submitBtn.addEventListener('click', () => {
            const input = userInput.value;
            
            if(input.trim() === "") {
                alert("Please enter some text first!");
                return;
            }
            
            resultBox.style.display = 'block';
            outputText.innerHTML = ""; 
            copyBtn.style.display = 'none'; 
            submitBtn.disabled = true; 
            submitBtn.innerText = "Generating...";

            const fullText = "Analyzing input... Here is your processed result:\n\n" + input;
            let index = 0;

            function typeWriter() {
                if (index < fullText.length) {
                    if (fullText.charAt(index) === '\n') {
                        outputText.innerHTML += '<br>';
                    } else {
                        outputText.innerHTML += fullText.charAt(index);
                    }
                    index++;
                    setTimeout(typeWriter, 25); 
                } else {
                    outputText.innerHTML += '<span class="cursor"></span>';
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Process Data";
                    copyBtn.style.display = 'inline-block'; 
                }
            }
            
            typeWriter();
        });

        // --- COPY LOGIC ---
        copyBtn.addEventListener('click', () => {
            const textToCopy = outputText.innerText; 
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                copyBtn.innerText = "✅ Copied!";
                copyBtn.style.backgroundColor = "#27ae60";
                
                setTimeout(() => { 
                    copyBtn.innerText = "📋 Copy"; 
                    copyBtn.style.backgroundColor = "#2ecc71";
                }, 2000);
            }).catch(err => {
                alert("Failed to copy! " + err);
            });
        });
    </script>
</body>
</html>
