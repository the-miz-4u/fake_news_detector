<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fake News Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #333; padding: 20px; }
        
        .main-container, .history-container { background: white; width: 100%; max-width: 600px; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); text-align: center; transition: transform 0.3s ease; }
        .main-container:hover { transform: translateY(-5px); }
        .history-container { padding: 25px 40px; margin-top: 20px; text-align: left; }
        
        h1 { color: #2c3e50; margin-bottom: 10px; font-size: 28px; font-weight: 600; }
        h3 { color: #2c3e50; font-size: 20px; margin-bottom: 15px; border-bottom: 2px solid #f1f2f6; padding-bottom: 10px; }
        p.subtitle { color: #7f8c8d; margin-bottom: 25px; font-size: 14px; }
        
        textarea { width: 100%; height: 120px; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; resize: none; font-size: 16px; outline: none; transition: border-color 0.3s ease; background-color: #f9f9f9; }
        textarea:focus { border-color: #3498db; background-color: #fff; }
        
        button { margin-top: 20px; padding: 12px 25px; font-size: 16px; font-weight: 600; color: white; background: #3498db; border: none; border-radius: 8px; cursor: pointer; width: 100%; transition: background 0.3s ease; display: flex; justify-content: center; align-items: center; gap: 10px; }
        button:hover { background: #2980b9; }
        
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #result-box { margin-top: 25px; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: 600; display: none; opacity: 0; transition: opacity 0.5s ease; text-align: left; }
        .real-news { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .fake-news { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        .confidence-container { margin-top: 15px; }
        .confidence-text { font-size: 14px; font-weight: 400; margin-bottom: 5px; }
        .progress-bg { background: rgba(0,0,0,0.1); border-radius: 5px; height: 10px; width: 100%; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 1s ease-in-out; border-radius: 5px; }
        
        #explanation-box { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.1); font-size: 14px; font-weight: 400; display: none; }
        .ai-badge { display: inline-block; background: #6c5ce7; color: white; font-size: 11px; padding: 3px 8px; border-radius: 12px; margin-bottom: 5px; font-weight: 600; }
        
        /* History Item Styles */
        .history-item { padding: 12px 0; border-bottom: 1px solid #f1f2f6; display: flex; flex-direction: column; gap: 8px; }
        .history-item:last-child { border-bottom: none; }
        .h-text { font-size: 14px; color: #555; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-style: italic; }
        .h-meta { font-size: 13px; font-weight: 600; }
        .h-badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; color: white; margin-right: 8px; }
        .h-real { background-color: #28a745; }
        .h-fake { background-color: #dc3545; }
        
        .footer { margin-top: 30px; color: #888; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>📰 Verify The News</h1>
        <p class="subtitle">Paste any News Text <strong>OR</strong> an Article Link (URL) below to check its authenticity.</p>

        <form id="news-form">
            <textarea id="news-text" placeholder="Enter news text OR paste an article link (e.g., https://...) here..." required></textarea>
            <button type="submit" id="submit-btn">
                <span id="btn-text">Verify Claim</span>
                <div class="spinner" id="loading-spinner"></div>
            </button>
        </form>

        <div id="result-box">
            <div id="prediction-text" style="text-align: center;"></div>
            <div class="confidence-container">
                <div class="confidence-text" id="confidence-label">AI Confidence: 0%</div>
                <div class="progress-bg"><div class="progress-bar" id="confidence-bar"></div></div>
            </div>
            <div id="explanation-box">
                <span class="ai-badge">✨ AI Reasoning</span>
                <p id="explanation-text"></p>
            </div>
        </div>
    </div>

    <div class="history-container">
        <h3>🕒 Recent Fact-Checks</h3>
        <div id="history-list">
            <p style="font-size: 14px; color: #888;">No recent searches yet.</p>
        </div>
    </div>

    <div class="footer">
        Designed by Manish Sharma
    </div>

    <script>
        // Page load hote hi history fetch karna
        window.onload = loadHistory;

        async function loadHistory() {
            try {
                const response = await fetch('/history');
                const data = await response.json();
                
                const historyList = document.getElementById('history-list');
                
                if (data.length > 0) {
                    historyList.innerHTML = '';
                    data.forEach(item => {
                        const badgeClass = item.prediction === 'Real' ? 'h-real' : 'h-fake';
                        historyList.innerHTML += `
                            <div class="history-item">
                                <div class="h-text">"${item.text}"</div>
                                <div class="h-meta">
                                    <span class="h-badge ${badgeClass}">${item.prediction}</span>
                                    <span style="color: #7f8c8d;">Conf: ${item.confidence}%</span>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (error) {
                console.error("History fetch fail:", error);
            }
        }

        document.getElementById('news-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newsText = document.getElementById('news-text').value;
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('loading-spinner');
            const resultBox = document.getElementById('result-box');
            const submitBtn = document.getElementById('submit-btn');
            
            btnText.innerText = "Analyzing...";
            spinner.style.display = "block";
            submitBtn.disabled = true;
            resultBox.style.display = "none";
            document.getElementById('explanation-box').style.display = "none";
            resultBox.style.opacity = "0";

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: newsText })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error);

                resultBox.style.display = "block";
                setTimeout(() => resultBox.style.opacity = "1", 50);

                if (data.prediction === "Real") {
                    resultBox.className = "real-news";
                    document.getElementById('prediction-text').innerHTML = "✅ This claim appears to be <strong>REAL</strong>.";
                    document.getElementById('confidence-bar').style.backgroundColor = "#28a745";
                } else {
                    resultBox.className = "fake-news";
                    document.getElementById('prediction-text').innerHTML = "🚨 This claim appears to be <strong>FAKE</strong>.";
                    document.getElementById('confidence-bar').style.backgroundColor = "#dc3545";
                }

                document.getElementById('confidence-label').innerHTML = `AI Confidence: <strong>${data.confidence}%</strong>`;
                setTimeout(() => { document.getElementById('confidence-bar').style.width = `${data.confidence}%`; }, 100);

                document.getElementById('explanation-box').style.display = "block";
                document.getElementById('explanation-text').innerHTML = data.explanation;

                // --- NAYA: Nayi search ke baad history table ko chupchap refresh karna ---
                loadHistory();

            } catch (error) {
                resultBox.style.display = "block";
                resultBox.style.opacity = "1";
                resultBox.className = "fake-news";
                document.getElementById('prediction-text').innerHTML = "⚠️ Error processing request on server.";
            } finally {
                btnText.innerText = "Verify Claim";
                spinner.style.display = "none";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
